<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yerevan Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260611-4" />
  </head>
  <body>
    <main class="app-shell">
      <div class="sticky-header">
        <header class="topbar">
          <div>
            <p class="eyebrow">Yerevan Events Aggregator</p>
            <h1>Events in Yerevan</h1>
          </div>
          <div class="summary" aria-live="polite">
            <span id="event-count">0</span>
            <span id="event-count-label">&#1089;&#1086;&#1073;&#1099;&#1090;&#1080;&#1081;</span>
          </div>
        </header>

        <section class="filters" aria-label="Event filters">
          <label>
            <span>&#1044;&#1072;&#1090;&#1072;</span>
            <input id="date-input" type="date" />
          </label>

          <label>
            <span>&#1050;&#1072;&#1090;&#1077;&#1075;&#1086;&#1088;&#1080;&#1103;</span>
            <select id="category-input">
              <option value="">&#1042;&#1089;&#1077; &#1082;&#1072;&#1090;&#1077;&#1075;&#1086;&#1088;&#1080;&#1080;</option>
              <option value="concert">&#1050;&#1086;&#1085;&#1094;&#1077;&#1088;&#1090;&#1099;</option>
              <option value="theatre">&#1058;&#1077;&#1072;&#1090;&#1088;</option>
              <option value="exhibition">&#1042;&#1099;&#1089;&#1090;&#1072;&#1074;&#1082;&#1080;</option>
              <option value="party">&#1042;&#1077;&#1095;&#1077;&#1088;&#1080;&#1085;&#1082;&#1080;</option>
              <option value="movie">&#1050;&#1080;&#1085;&#1086;</option>
              <option value="workshop">&#1052;&#1072;&#1089;&#1090;&#1077;&#1088;-&#1082;&#1083;&#1072;&#1089;&#1089;&#1099;</option>
              <option value="tourism">&#1058;&#1091;&#1088;&#1080;&#1079;&#1084;</option>
              <option value="food">&#1045;&#1076;&#1072;</option>
              <option value="kids">&#1044;&#1077;&#1090;&#1103;&#1084;</option>
              <option value="other">&#1044;&#1088;&#1091;&#1075;&#1086;&#1077;</option>
            </select>
          </label>
          <button id="reset-button" type="button">&#1057;&#1073;&#1088;&#1086;&#1089;&#1080;&#1090;&#1100;</button>
        </section>
      </div>

      <section id="status-message" class="status-message" aria-live="polite">Loading events...</section>
      <section id="events-list" class="events-list" aria-label="Events list"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js?v=20260611-3"></script>
  </body>
</html>
